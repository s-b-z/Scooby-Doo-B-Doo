<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scooby Doo Palindrome Checker</title>
<link href="styles.css" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

</head>
<body>



<div class="project">

 <div id="start-overlay"></div> 

  <div class="scene">
    <img id="castle" class="fade-image show" src="https://vignette.wikia.nocookie.net/scoobydoo/images/4/40/Fortescu_Castle.png/revision/latest?cb=20170513141529" alt="spooky castle">
    </div>




  <div class="opening audio">

  <audio id="thunder-audio"  src="https://www.orangefreesounds.com/wp-content/uploads/2021/10/Thunder-clap-sound-efect.mp3"></audio>
 
 <audio id="thunder-rumble" src="https://www.orangefreesounds.com/wp-content/uploads/2023/01/Sound-of-thunder-storm.mp3"></audio>

<audio id="shaggy-voice"
       src="https://file.garden/aEsEXEVluAeY7uzS/this-is-spooksville-101soundboards.mp3"></audio>

<audio id="music1" src="https://file.garden/aEsEXEVluAeY7uzS/closing-theme-song-101soundboards.mp3"></audio>

</div>

<div class="hallway-audio">
  <audio id="daphne" src="https://file.garden/aEsEXEVluAeY7uzS/golee-daphne-101soundboards.mp3"></audio>
</div>

<div id="scene-2" class="scene-2 fade-image">
   
    <div id="hallway-wrapper">
    <div id="hallway" class="fade-image" src="https://i.pinimg.com/originals/7e/3d/e0/7e3de0d949615500e0084671921ded1c.jpg" alt="spooky-hallway"></div>

<div>

<img id="lamp" src="https://i.imgur.com/fe8rYO3.png">

<img id="footprints" src="https://i.imgur.com/IMHLZvg.png">

  </div>
  
  
<div class="scene-2-objects">

  <img id="corner-tag" src="https://i.imgur.com/6CkXvG3.png">

  <div id="checker" class="checker-div">
   <img id="scooby-tag"   src="https://i.imgur.com/khpqokh.png">

     <button
id="check-btn">Zoinks!</button>


  <input type="text" id="text-input"  placeholder="what's the word?">
  </div>
</div>

</div>
</div>

</div>

  <script src="script.js"></script>
</body>
</html>
